name: sibna_app
description: SIBNA — Secure authentication and vault application.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.2

  # State management
  flutter_riverpod: ^2.5.1

  # UI
  google_fonts: ^6.2.1
  animate_do: ^3.3.4
  pinput: ^5.0.0

  # Storage
  flutter_secure_storage: ^9.2.4

  # Device & Platform
  device_info_plus: ^10.1.2
  sim_card_info: ^1.0.1
  permission_handler: ^11.3.1

  # Phone input
  intl_phone_field: ^3.2.0

  # Localization
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  # Fonts are loaded via google_fonts package — no local font assets needed
